<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Exercicio Grid</title>
</head>
<body>
    <div class="soc-dashboard">
        <div class="card card-destaque">
            <h3>Trafégo Global (Ao Vivo)</h3>
            <p>1.2 Gbps - Normal </p>
        </div>
        <div class=" card ">
            <h3> Tentativas de Invasão </h3>
            <p>42 bloqueadas hoje</p>
        </div>
        <div class=" card ">
            <h3> Uso de CPU</h3>
            <p>45% - Estável</p>
        </div>
        <div class=" card ">
            <h3>Latência de Rede </h3>
            <p> 12ms </p>
        </div>
        <div class=" card ">
            <h3>Uso de Memória </h3>
            <p> 68% - Moderado </p>
        </div>
        <div class=" card ">
            <h3> Status do Servidor </h3>
            <p> Online - Sem falhas </p>
        </div>
     </div>
</body>
</html>
